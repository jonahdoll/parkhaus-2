info:
  name: Name Parkhaus Aachen
  type: http
  seq: 4

http:
  method: GET
  url: "{{restUrl}}?name=Parkhaus Aachen"
  headers:
    - name: Accept
      value: application/json
  params:
    - name: name
      value: Parkhaus Aachen
      type: query
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.headers['content-type']
      operator: matches
      value: ^application\/json(; charset=utf-8)?$
    - expression: res.body.content
      operator: isArray
    - expression: res.body.content
      operator: length
      value: "1"
    - expression: res.body.content[0].id
      operator: gte
      value: "0"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
