info:
  name: Kapazitaet <= 100
  type: http
  seq: 5

http:
  method: GET
  url: "{{restUrl}}?kapazitaet=100"
  headers:
    - name: Accept
      value: application/json
  params:
    - name: kapazitaet
      value: "100"
      type: query
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.headers['content-type']
      operator: matches
      value: ^application\/json(; charset=utf-8)?$
    - expression: res.body.content
      operator: isArray
    - expression: res.body.content
      operator: isNotEmpty

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
