info:
  name: Parkhaus 4 ändern
  type: http
  seq: 1

http:
  method: PUT
  url: "{{restUrl}}/:id"
  headers:
    - name: If-Match
      value: '"0"'
  params:
    - name: id
      value: "4"
      type: path
  body:
    type: json
    data: |-
      {
        "name": "Südpfalz-Parkhaus Bellheim",
        "kapazitaet": 120,
        "tarifProStunde": 2.3
      }
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "204"
    - expression: res.body
      operator: isString
    - expression: res.body
      operator: isEmpty

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
