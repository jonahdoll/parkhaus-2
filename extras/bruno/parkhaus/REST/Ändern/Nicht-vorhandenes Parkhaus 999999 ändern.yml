info:
  name: Nicht-vorhandenes Parkhaus 999999 ändern
  type: http
  seq: 5

http:
  method: PUT
  url: "{{restUrl}}/:id"
  headers:
    - name: If-Match
      value: '"0"'
  params:
    - name: id
      value: "999999"
      type: path
  body:
    type: json
    data: |-
      {
        "name": "Südpfalz-Parkhaus Bellheim",
        "kapazitaet": 120,
        "tarifProStunde": 2.3
      }
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "404"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
